version: "3.7"

services:
  buscador:
    image: buscador-api:latest
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_swarm_public
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:***@postgres:5432/buscador_passagens?sslmode=disable
      - REDIS_URL=redis://redis:6379/12
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY}
      - ALERTA_INTERVAL_HORAS=2
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == pelagus-core
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.http.routers.buscador.rule=Host(`buscador.pelagus.com.br`)
        - traefik.http.routers.buscador.entrypoints=websecure
        - traefik.http.routers.buscador.tls.certresolver=letsencryptresolver
        - traefik.http.routers.buscador.service=buscador
        - traefik.http.services.buscador.loadbalancer.server.port=8000
        - traefik.http.services.buscador.loadbalancer.passHostHeader=true

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public
